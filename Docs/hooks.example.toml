# Add this to ~/.codex/config.toml, then run /hooks in Codex to review/trust it.

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "$HOME/.codex/bin/codex-light-hook-mxp UserPromptSubmit"
timeout = 5
statusMessage = "Codex traffic light: working"

[[hooks.PreToolUse]]
matcher = ".*"
[[hooks.PreToolUse.hooks]]
type = "command"
command = "$HOME/.codex/bin/codex-light-hook-mxp PreToolUse"
timeout = 5
statusMessage = "Codex traffic light: working"

[[hooks.PermissionRequest]]
matcher = ".*"
[[hooks.PermissionRequest.hooks]]
type = "command"
command = "$HOME/.codex/bin/codex-light-hook-mxp PermissionRequest"
timeout = 5
statusMessage = "Codex traffic light: waiting"

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "$HOME/.codex/bin/codex-light-hook-mxp Stop"
timeout = 5
statusMessage = "Codex traffic light: done"

[[hooks.SubagentStop]]
matcher = ".*"
[[hooks.SubagentStop.hooks]]
type = "command"
command = "$HOME/.codex/bin/codex-light-hook-mxp SubagentStop"
timeout = 5
statusMessage = "Codex traffic light: subagent done"

# Optional: enable this only if your Codex version emits a stable quota/rate-limit hook event
# with five_hour_remaining_percent + weekly_remaining_percent or camelCase equivalents.
