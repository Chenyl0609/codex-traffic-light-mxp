    <text x="78" y="292" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, Hiragino Sans GB, Noto Sans CJK SC, sans-serif" font-size="68" font-weight="950" fill="#151515" text-anchor="start" letter-spacing="0">
