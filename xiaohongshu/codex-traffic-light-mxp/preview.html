<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codex Traffic Light MXP 小红书图文预览</title>
  <style>
    body {
      margin: 0;
      background: #f4f4f2;
      color: #151515;
      font-family: -apple-system, BlinkMacSystemFont, PingFang SC, Hiragino Sans GB, Noto Sans CJK SC, sans-serif;
    }
    main {
      max-width: 1220px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 28px;
      color: #666;
      font-size: 17px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }
    figure {
      margin: 0;
      background: white;
      border: 1px solid #e5e2dc;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 14px 34px rgba(0,0,0,.08);
    }
    img {
      display: block;
      width: 100%;
      border-radius: 10px;
    }
    figcaption {
      padding: 10px 4px 2px;
      color: #555;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Codex Traffic Light MXP 小红书图文预览</h1>
    <p>7 页，900×1200，痛点直击方向。PNG 在 cards-png，SVG 源稿在 cards-svg。</p>
    <section class="grid">
        <figure>
          <img src="cards-png/01-cover.png" alt="01-cover" />
          <figcaption>1. 别再盯着 Codex 终端了</figcaption>
        </figure>
      

        <figure>
          <img src="cards-png/02-pain.png" alt="02-pain" />
          <figcaption>2. Codex 跑着跑着 我总想切回去看</figcaption>
        </figure>
      

        <figure>
          <img src="cards-png/03-solution.png" alt="03-solution" />
          <figcaption>3. 我给 Codex 做了一个交通灯</figcaption>
        </figure>
      

        <figure>
          <img src="cards-png/04-states.png" alt="04-states" />
          <figcaption>4. 红黄绿暗 各管一件事</figcaption>
        </figure>
      

        <figure>
          <img src="cards-png/05-hooks.png" alt="05-hooks" />
          <figcaption>5. Hooks 不只变灯 还能同步额度</figcaption>
        </figure>
      

        <figure>
          <img src="cards-png/06-advanced.png" alt="06-advanced" />
          <figcaption>6. 额度也能 自动显示</figcaption>
        </figure>
      

        <figure>
          <img src="cards-png/07-cta.png" alt="07-cta" />
          <figcaption>7. 适合 Codex 重度用户</figcaption>
        </figure>
      </section>
  </main>
</body>
</html>
